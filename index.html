<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Psikyo · logging emojis</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b1a2e 0%, #0a111f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 16px;
      margin: 0;
      /* phone‑like feel */
      touch-action: pan-y;
    }

    /* card – looks like a phone screen widget */
    .phone-card {
      max-width: 400px;
      width: 100%;
      background: rgba(18, 30, 45, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 56px 56px 48px 48px;
      padding: 32px 20px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      border: 1px solid rgba(255, 215, 100, 0.2);
      transition: all 0.2s ease;
    }

    /* main headline */
    .psikyo-title {
      font-size: clamp(3.2rem, 18vw, 5.2rem);
      font-weight: 700;
      letter-spacing: 6px;
      text-align: center;
      color: #f7e9c3;
      text-shadow: 
        0 0 6px #fbbf6e,
        0 0 15px #f7931e,
        0 0 30px #d45a1a,
        0 4px 12px rgba(0, 0, 0, 0.8);
      margin-bottom: 12px;
      word-break: keep-all;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      transform: scale(1);
      transition: transform 0.2s;
      line-height: 1.2;
    }

    /* emoji row – "logging" style with animated emojis */
    .log-emoji-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem 0.9rem;
      margin-top: 16px;
      padding: 12px 8px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 60px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 210, 120, 0.25);
      box-shadow: 0 0 20px rgba(255, 180, 50, 0.15);
    }

    .log-emoji {
      font-size: 2.8rem;
      line-height: 1.4;
      display: inline-block;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform;
      animation: floatPulse 2.8s infinite alternate ease-in-out;
      transform-origin: center;
      /* individual delays will be set inline via style */
    }

    /* each emoji gets a unique animation delay via inline style, 
       but we also set a base keyframe that works for all */
    @keyframes floatPulse {
      0% {
        transform: translateY(0px) scale(0.95);
        opacity: 0.8;
      }
      100% {
        transform: translateY(-8px) scale(1.15);
        opacity: 1;
      }
    }

    /* extra subtle wobble for some emojis – will be combined with inline delays */
    .log-emoji:nth-child(odd) {
      animation-name: floatPulse, wobble;
      animation-duration: 2.8s, 3.2s;
    }
    @keyframes wobble {
      0% { transform: rotate(0deg) scale(0.95); }
      25% { transform: rotate(6deg) scale(1.05); }
      75% { transform: rotate(-6deg) scale(1.0); }
      100% { transform: rotate(0deg) scale(1.15); }
    }

    /* small label “logging” */
    .logging-badge {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      color: #b9c9e0;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 16px;
      border-radius: 40px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 150, 0.15);
    }

    .logging-badge span {
      font-size: 1.1rem;
      filter: drop-shadow(0 0 6px #fbbf6e);
    }

    /* phone notch / status bar simulation (just for fun) */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 0 4px 12px 4px;
      color: rgba(255, 255, 240, 0.3);
      font-size: 0.7rem;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 215, 100, 0.08);
      margin-bottom: 6px;
    }

    /* responsive fine-tune */
    @media (max-width: 480px) {
      .phone-card {
        border-radius: 40px;
        padding: 24px 12px 32px;
      }
      .log-emoji {
        font-size: 2.4rem;
      }
      .log-emoji-strip {
        gap: 0.2rem 0.6rem;
        padding: 8px 6px;
      }
    }

    /* extra small screens */
    @media (max-width: 360px) {
      .psikyo-title {
        font-size: 2.8rem;
        letter-spacing: 3px;
      }
      .log-emoji {
        font-size: 2rem;
      }
    }

    /* make it feel like an app screen */
    .screen-glow {
      position: relative;
    }
    .screen-glow::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 58px;
      background: radial-gradient(circle at 30% 20%, rgba(255, 200, 100, 0.08), transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="phone-card screen-glow">
  <!-- fake status (just style) -->
  <div class="status-bar">
    <span>📶 5G</span>
    <span>🔋 86%</span>
  </div>

  <!-- main name: Psikyo -->
  <div class="psikyo-title">Psikyo</div>

  <!-- logging emojis strip (visible, animated) -->
  <div class="log-emoji-strip">
    <span class="log-emoji" style="animation-delay: 0.0s;">📝</span>
    <span class="log-emoji" style="animation-delay: 0.4s;">🪵</span>
    <span class="log-emoji" style="animation-delay: 0.8s;">📋</span>
    <span class="log-emoji" style="animation-delay: 1.2s;">🔍</span>
    <span class="log-emoji" style="animation-delay: 1.6s;">📌</span>
    <span class="log-emoji" style="animation-delay: 2.0s;">✍️</span>
    <span class="log-emoji" style="animation-delay: 0.2s;">📎</span>
    <span class="log-emoji" style="animation-delay: 0.9s;">🗂️</span>
    <span class="log-emoji" style="animation-delay: 1.4s;">📊</span>
    <span class="log-emoji" style="animation-delay: 1.8s;">✅</span>
  </div>

  <!-- subtle "logging" indicator -->
  <div class="logging-badge">
    <span>⏳</span> · logging · <span>🔄</span>
  </div>

  <!-- tiny footnote: live emoji activity -->
  <div style="margin-top: 18px; text-align: center; font-size: 0.65rem; color: rgba(200, 190, 170, 0.3); letter-spacing: 1px; border-top: 1px solid rgba(255,215,100,0.05); padding-top: 14px;">
    ⚡ live log stream · psikyo active
  </div>
</div>

<!-- 
  Explanation: 
  - The name "Psikyo" is displayed prominently with glow & shadow.
  - Below, a row of logging emojis (📝, 🪵, 📋, 🔍, etc.) is shown with 
    individual animation delays, making them "bounce" & "wobble" 
    like active logging indicators.
  - Fully responsive, tested on mobile screens.
  - Uses backdrop blur & dark theme for a modern phone UI.
-->

</body>
</html>
